# ═══════════════════════════════════════════════════════════════════════════
# GitHub Actions Workflow — Ludo King Remastered
# Triggers on every push to main/master.
# Unzips ludo_king.zip (if present in repo root), then builds the APK.
# If no zip is present, builds directly from the repo source tree.
# ═══════════════════════════════════════════════════════════════════════════
name: Build Ludo King APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the repository ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Unzip project if ludo_king.zip exists in repo root ─────────────
      #    When you push ludo_king.zip to the repo root, this step extracts
      #    the Flutter project into the workspace. If the zip is absent the
      #    step is skipped and the existing repo tree is used as-is.
      - name: Unzip ludo_king.zip (if present)
        run: |
          if [ -f "ludo_king.zip" ]; then
            echo "Found ludo_king.zip — extracting..."
            unzip -o ludo_king.zip -d extracted/
            # Move extracted contents to workspace root if nested inside a subfolder
            EXTRACTED_DIR=$(find extracted/ -maxdepth 1 -mindepth 1 -type d | head -1)
            if [ -n "$EXTRACTED_DIR" ]; then
              echo "Moving $EXTRACTED_DIR contents to workspace root..."
              shopt -s dotglob
              cp -rn "$EXTRACTED_DIR"/. ./
              shopt -u dotglob
            fi
            echo "Extraction complete."
          else
            echo "No ludo_king.zip found — building from repo source tree directly."
          fi

      # ── 3. Verify project structure ────────────────────────────────────────
      - name: Verify Flutter project structure
        run: |
          echo "=== Workspace root ==="
          ls -la
          echo "=== lib/ ==="
          ls -la lib/ || echo "lib/ not found"
          echo "=== android/ ==="
          ls -la android/ || echo "android/ not found"
          echo "=== pubspec.yaml ==="
          cat pubspec.yaml || echo "pubspec.yaml not found"

      # ── 4. Set up Java 17 ─────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 5. Set up Flutter stable ──────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # ── 6. Verify Flutter installation ────────────────────────────────────
      - name: Flutter version
        run: flutter --version

      # ── 7. Install Dart/Flutter dependencies ──────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 8. Grant Gradle wrapper execute permission ────────────────────────
      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      # ── 9. Run Flutter analyze (non-blocking) ────────────────────────────
      - name: Analyze Dart code
        run: flutter analyze --no-fatal-infos || true

      # ── 10. Build debug APK (split per ABI for smaller size) ──────────────
      - name: Build debug APK
        run: |
          flutter build apk \
            --debug \
            --split-per-abi \
            --target-platform android-arm,android-arm64,android-x64

      # ── 11. List built APKs ───────────────────────────────────────────────
      - name: List built APKs
        run: |
          echo "=== Built APKs ==="
          find build/app/outputs/flutter-apk/ -name "*.apk" -type f
          ls -lh build/app/outputs/flutter-apk/*.apk 2>/dev/null || echo "No APKs found"

      # ── 12. Upload APK artifacts ──────────────────────────────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ludo-king-debug-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
          if-no-files-found: error
