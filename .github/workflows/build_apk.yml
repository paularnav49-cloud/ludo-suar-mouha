name: Build Ludo King APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ──────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Set up Flutter ──────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # ── 4. Unzip ludo_king.zip into a temp folder ──────────────────────────
      - name: Unzip ludo_king.zip
        run: |
          if [ ! -f "ludo_king.zip" ]; then
            echo "ERROR: ludo_king.zip not found in repository root"
            exit 1
          fi
          echo "Extracting ludo_king.zip..."
          unzip -o ludo_king.zip -d /tmp/extracted/
          echo "Extracted contents:"
          ls -la /tmp/extracted/

      # ── 5. Create a fresh Flutter project (generates gradlew + android/) ───
      - name: Create fresh Flutter project scaffold
        run: |
          flutter create \
            --org com.example \
            --project-name ludo_king_remastered \
            --platforms android \
            /tmp/flutter_scaffold
          echo "Scaffold created. Contents:"
          ls -la /tmp/flutter_scaffold/

      # ── 6. Overlay our source files on top of the scaffold ─────────────────
      #    This preserves the auto-generated gradlew, gradle wrapper,
      #    and plugin registration files while using our custom source.
      - name: Overlay project source onto scaffold
        run: |
          EXTRACT_DIR="/tmp/extracted/ludo_project"

          # Check which folder the zip extracted into
          if [ ! -d "$EXTRACT_DIR" ]; then
            # Try finding it one level deeper
            EXTRACT_DIR=$(find /tmp/extracted/ -maxdepth 2 -name "pubspec.yaml" \
                          -exec dirname {} \; | head -1)
          fi

          echo "Source directory: $EXTRACT_DIR"
          ls -la "$EXTRACT_DIR"

          # Copy our lib/ (main.dart)
          cp -r "$EXTRACT_DIR/lib/"* /tmp/flutter_scaffold/lib/

          # Copy our pubspec.yaml
          cp "$EXTRACT_DIR/pubspec.yaml" /tmp/flutter_scaffold/pubspec.yaml

          # Copy our custom MainActivity.kt
          KOTLIN_DST="/tmp/flutter_scaffold/android/app/src/main/kotlin/com/example/ludo_king_remastered"
          mkdir -p "$KOTLIN_DST"
          cp "$EXTRACT_DIR/android/app/src/main/kotlin/com/example/ludo_king_remastered/MainActivity.kt" \
             "$KOTLIN_DST/MainActivity.kt"

          # Copy AndroidManifest.xml
          cp "$EXTRACT_DIR/android/app/src/main/AndroidManifest.xml" \
             /tmp/flutter_scaffold/android/app/src/main/AndroidManifest.xml

          # Copy res/values (styles + colors)
          cp -r "$EXTRACT_DIR/android/app/src/main/res/values/"* \
                /tmp/flutter_scaffold/android/app/src/main/res/values/

          echo "Overlay complete. Final lib/ contents:"
          ls -la /tmp/flutter_scaffold/lib/

      # ── 7. Set working directory for all subsequent steps ──────────────────
      - name: Set project path env var
        run: echo "PROJECT=/tmp/flutter_scaffold" >> $GITHUB_ENV

      # ── 8. Install Flutter dependencies ────────────────────────────────────
      - name: Install dependencies
        working-directory: /tmp/flutter_scaffold
        run: flutter pub get

      # ── 9. gradlew is auto-generated by flutter create — make executable ───
      - name: Grant execute permission to gradlew
        run: chmod +x /tmp/flutter_scaffold/android/gradlew

      # ── 10. Analyze Dart code (non-blocking) ───────────────────────────────
      - name: Analyze Dart code
        working-directory: /tmp/flutter_scaffold
        run: flutter analyze --no-fatal-infos || true

      # ── 11. Build debug APK ─────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: /tmp/flutter_scaffold
        run: |
          flutter build apk \
            --debug \
            --split-per-abi \
            --target-platform android-arm,android-arm64,android-x64

      # ── 12. List built APKs ─────────────────────────────────────────────────
      - name: List built APKs
        run: |
          echo "=== Built APKs ==="
          find /tmp/flutter_scaffold/build/app/outputs/flutter-apk/ -name "*.apk"
          ls -lh /tmp/flutter_scaffold/build/app/outputs/flutter-apk/*.apk

      # ── 13. Upload APK artifacts ────────────────────────────────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ludo-king-debug-apks
          path: /tmp/flutter_scaffold/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
          if-no-files-found: error
